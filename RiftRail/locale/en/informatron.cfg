# ==========================================
# Informatron Guide: Rift Rail
# ==========================================

# -- Main Page --
menu_rift_rail_informatron=Rift Rail [item=rift-rail-placer]
title_rift_rail_informatron=Rift Rail Guide
page_main_text_1=Welcome to [font=default-bold][color=193,128,255]Rift Rail[/color][/font]! This mod offers a compact, high-tech logistics solution, allowing you to seamlessly teleport trains across vast distances, different surfaces, and even spaceships.
page_main_text_2=Unlike traditional bidirectional connections, Rift Rail utilizes an [font=default-bold][color=orange]asymmetric, one-way teleportation system[/color][/font]. It flawlessly supports locomotives, cargo wagons, fluid wagons, and artillery wagons. Players inside the train are teleported instantly too! Please check the left menu for detailed operation guides.

# -- Operation & Pairing --
menu_rr_pairing=Modes & Pairing
title_rr_pairing=Operation Modes and Pairing Guide
page_pairing_text_1=Place a [item=rift-rail-placer] (Rift Rail Placer). Open its GUI and configure it as either [color=green]Entry[/color] or [color=orange]Exit[/color].\n\n[font=default-bold]How to Pair:[/font]\n1. Make sure you have built both an Entry and an Exit.\n2. Open the GUI of one portal, select the other portal from the "Target Selector" dropdown menu, and click the [color=green]Pair[/color] button.\n3. Once successfully paired, trains driving into the Entry will instantly emerge from the connected Exit.

# -- Routing Logic --
menu_rr_routing=N-to-M Routing
title_rr_routing=N-to-M Routing Priorities
page_routing_text_1=As of v0.10, Rift Rail supports complex [font=default-bold][color=green]Many-to-Many (N-to-M)[/color][/font] networks! You can connect 1 Entry to up to 5 Exits simultaneously, or multiple Entries to 1 Exit.\n\nWhen 1 Entry is connected to multiple Exits, the portal decides the destination based on the following [color=orange]priority[/color]:
page_routing_text_2=[font=default-bold]1. Train Schedule Signal (Highest):[/font] If the train schedule wait conditions include [virtual-signal=riftrail-go-to-id] = [Target ID] (the comparator does not affect routing; only the numeric value is read), and that ID points to a valid connected Exit, the train teleports to that Exit.\n\n[font=default-bold]2. Entry Circuit Signal:[/font] If step 1 does not resolve to a valid Exit, Rift Rail reads [virtual-signal=riftrail-go-to-id] from the Entry-side circuit network and routes to the matched Exit.\n\n[font=default-bold]3. Default (Fallback):[/font] If neither signal resolves to a valid Exit, Rift Rail uses the configured default Exit; if it is unavailable, it falls back to the first available connected Exit.

# -- LTN --
menu_rr_ltn=LTN Integration
title_rr_ltn=LTN Cross-Surface Setup
page_ltn_text_1=As of v0.10, the cross-surface LTN setup logic has been updated. To establish a valid LTN route between Surface A and Surface B, you must strictly follow these rules:\n\n[font=default-bold]1. Two-Way Round Trip (Hard Requirement):[/font]\nThe LTN dispatcher needs to calculate a return path to successfully dispatch trains. You must build [color=green]Entry A -> Exit B[/color] (e.g., Nauvis to Vulcanus), AND a reverse path [color=orange]Entry C -> Exit D[/color] (e.g., Vulcanus to Nauvis).\n\n[font=default-bold]2. Manual Independent Activation:[/font]\nUnlike older versions, the switch now ONLY affects the building you clicked. You must open the GUI for ALL [color=red]4 portals[/color] involved and [color=green]manually enable[/color] the "LTN" switch on both entry and exit sides.\n\n[font=default-bold]3. Universal Network (ID -1):[/font]\nTo simplify configuration, the custom portal network ID feature has been removed. All Rift Rail portals now permanently use [color=purple]Network ID -1[/color], acting as universal bridges for all LTN networks.

# -- CS2 --
menu_rr_cs2=CS2 Integration
title_rr_cs2=Cybersyn 2 (CS2) Cross-Surface Setup
page_cs2_text_1=As of v0.12, Rift Rail reintroduces native support for [font=default-bold][color=cyan]Cybersyn 2 (CS2)[/color][/font] via its route plugin API. To establish a valid CS2 route between Surface A and Surface B, follow these rules:\n\n[font=default-bold]1. Two-Way Round Trip (Hard Requirement):[/font]\nThe CS2 dispatcher needs a valid return path to dispatch trains. You must build [color=green]Entry A -> Exit B[/color] (e.g., Nauvis to Vulcanus), AND the reverse [color=orange]Entry C -> Exit D[/color] (e.g., Vulcanus to Nauvis).\n\n[font=default-bold]2. Manual Independent Activation:[/font]\nThe switch only affects the building you clicked. Open the GUI for ALL [color=red]4 portals[/color] and [color=green]manually enable[/color] the "CS2" switch on both entry and exit sides.\n\n[font=default-bold]3. Automatic Global-Optimal Routing:[/font]\nWhen multiple portals are available, Rift Rail automatically selects the globally optimal path — minimizing the combined distance of the train's approach to the entry portal and the exit portal's proximity to the destination stop. No manual configuration needed.\n\n[font=default-bold]4. One-Way Route Warning:[/font]\nIf enabling CS2 on a portal results in a one-way route (e.g., A→B exists but B→A does not), [color=orange]Rift Rail will warn you in chat[/color]. Build the return route to resolve the warning.

# -- FAQ --
menu_rr_faq=FAQ & Troubleshooting
title_rr_faq=Frequently Asked Questions
page_faq_text_1=[font=default-bold]Q: Is Cybersyn supported?[/font]\nA: [font=default-bold][color=green]Cybersyn 2 (CS2)[/color][/font] is natively supported as of v0.12! See the [color=cyan]CS2 Integration[/color] page in this guide for setup details.\n[color=default]Classic Cybersyn (v1)[/color] support was [color=red]permanently removed[/color] in v0.10. Downgrade to v0.10.1 (N-to-M) or v0.8.2 (1-to-1) if you strictly require it.\n\n[font=default-bold]Q: Trains crash and don't teleport, or colliders are broken?[/font]\nA: Please go to [Settings -> Mod settings -> Map] and click [color=orange]"Reset all colliders"[/color] for an emergency fix.\n\n[font=default-bold]Q: Will uninstalling this mod corrupt my save?[/font]\nA: Before uninstalling, you MUST check [color=red]"Uninstall cleanup"[/color] in the Mod Settings. This forces the disconnection of all portals and cleans up residual data to prevent save corruption!

# -- UPS Performance & Tuning --
menu_rr_ups=Performance (UPS)
title_rr_ups=Advanced: Performance & UPS Tuning
page_ups_text_1=For megabase builders pushing for maximum performance, Rift Rail offers deep optimization potential:\n\n[font=default-bold][color=orange]Same-Axis Placement[/color][/font] As long as the paired Entry and Exit are [color=green]both placed vertically, or both horizontally[/color], the portal bypasses complex standard spawning logic and directly calls the native Clone API for pixel-perfect duplication. This method consumes almost zero UPS and is the top choice for megabases![font=default-bold]Conclusion:[/font] For optimal teleportation performance, please avoid 90-degree "one horizontal, one vertical" setups. Keep the portals [color=orange]parallel[/color] whenever possible.
page_ups_text_2=[font=default-bold][color=orange]Tip 2: Balancing "Teleport Speed" and "Placement Interval"[/color][/font]\nYou can adjust these core parameters in the Mod Settings:\n[font=default-bold]· Placement Interval:[/font] Increasing this (e.g., to 2 or 3) significantly reduces script CPU usage, but delays carriage connection.\n[font=default-bold]· Teleport Speed:[/font] Higher values increase throughput, but high speeds MUST be paired with a low interval (like 1), otherwise trains will snap apart.\n\n[font=default-bold]🏆 Recommended Presets:[/font]\n[color=green]High Throughput Mode:[/color] Interval 1, Speed 1.0~2.4 (Best for most players).\n[color=purple]Ultimate UPS-Eco Mode:[/color] Interval 3, Speed 0.5~1.0 (Best for 1k+ SPM megabases, extremely low CPU drain).