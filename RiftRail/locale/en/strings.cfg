[technology-description]
rift-rail-tech=Unlocks Rift Rail, a cross-surface train portal system. Build portals to connect distant rail networks and enable seamless train teleportation.
[mod-name]
RiftRail=Rift Rail

[mod-description]
RiftRail=Provides an asymmetric, single-way cross-surface train teleportation system. Supports custom Entry/Exit mode switching and is fully compatible with Cybersyn logistics scheduling.
rift-rail-placer=Place a Rift interface that can teleport trains across space.\nSupports Space Exploration and Cybersyn.\n\n[Troubleshooting]\nIf trains do not teleport after collision, or if collisions fail, please go to [Settings -> Mod Settings -> Map] and click "Reset All Colliders" to fix it.

