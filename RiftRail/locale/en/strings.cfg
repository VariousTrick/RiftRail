[entity-description]
rift-rail-placer-entity=Places a Rift interface that can teleport trains across space.\nSupports Space Exploration and Cybersyn.\n\n[Troubleshooting]\nIf trains do not teleport after collision, or if collisions fail, please go to [Settings -> Mod Settings -> Map] and click "Reset All Colliders" to fix it.
rift-rail-entity=The main structure of the Rift Rail portal. Must be paired with another portal to enable train teleportation. If teleportation fails or you encounter issues, try using the “Rebuild Collider” option in mod settings.
rift-rail-core=The core component of the Rift Rail portal. Handles internal logic and connections.
[virtual-signal-name]
riftrail-go-to-id=RiftRail: Go To [ID]

[virtual-signal-description]
riftrail-go-to-id=Specifies target portal ID for teleportation.\nUsage: Set this signal value in the train schedule's circuit condition to the ID of the target portal.\nExample: riftrail-go-to-id = 5 means teleport to portal with ID 5.
