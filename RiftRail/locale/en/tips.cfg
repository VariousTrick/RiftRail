rift-rail-pairing-tutorial=Rift Rail Tutorial
item-description-pairing=The core mechanism of Rift Rail is [font=default-bold][color=green]pairing[/color][/font]: each entry must be connected to at least one exit to function properly. Once paired, when a train enters the entry, it will be teleported to the connected exit.\n\nTo pair: click on the [font=default-bold][color=green]Rift Rail Core[/color][/font], then click on the exit you want to connect to complete the pairing. Each entry can connect to multiple exits, and each exit can also connect to multiple entries.\n\nAfter pairing, the corresponding IDs will be displayed on the entries and exits (to help you identify their connections).

rift-rail-advanced-routing=Rift Rail Advanced Routing
item-description-advanced=Starting from v0.10, Rift Rail supports a complex [font=default-bold][color=green]many-to-many (N-to-M)[/color][/font] network! You can connect 1 Entry to up to 5 Exits, or connect 5 Entries to 1 Exit.\n\nWhen 1 Entry is connected to multiple Exits, the portal determines the train's destination based on the following [color=orange]priority[/color]:\n[font=default-bold]1. Train Schedule Signal (Highest Priority):[/font] If the train schedule sets [virtual-signal=riftrail-go-to-id] = [Target ID] (the comparator does not affect routing; only the numeric value is read), and that ID maps to a valid connected Exit, the train teleports to that Exit.\n\n[font=default-bold]2. Entry Circuit Signal:[/font] If step 1 does not resolve to a valid Exit, Rift Rail reads [virtual-signal=riftrail-go-to-id] from the Entry-side circuit network and tries to match an Exit.\n\n[font=default-bold]3. Default Fallback:[/font] If neither signal resolves to a valid Exit, Rift Rail uses the configured default Exit; if unavailable, it falls back to the first available connected Exit.\nFor megabase builders pushing for maximum performance, Rift Rail offers deep optimization potential:\n\n[font=default-bold][color=orange]Same-Axis Placement[/color][/font] As long as the paired Entry and Exit are [color=green]both placed vertically, or both horizontally[/color], the portal bypasses complex standard spawning logic and directly calls the native Clone API for pixel-perfect duplication. This method consumes almost zero UPS and is the top choice for megabases![font=default-bold]Conclusion:[/font] For optimal teleportation performance, please avoid 90-degree "one horizontal, one vertical" setups. Keep the portals [color=orange]parallel[/color] whenever possible.

