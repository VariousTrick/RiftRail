[rift_rail_informatron]
# ==========================================
# Informatron Guide: Rift Rail
# ==========================================

# -- Main Page --
menu_rift_rail_informatron=Rift Rail [item=rift-rail-placer]
title_rift_rail_informatron=Rift Rail ガイド
page_main_text_1=[font=default-bold][color=193,128,255]Rift Rail[/color][/font] へようこそ！この Mod はコンパクトかつ高機能な物流ソリューションを提供し、遠距離・異なるサーフェス間・宇宙船間で列車をシームレスにテレポートできます。
page_main_text_2=Rift Rail は従来の双方向接続ではなく、[font=default-bold][color=orange]非対称の片方向テレポート方式[/color][/font]を採用しています。機関車・貨物車・流体車・砲兵車に対応し、列車内のプレイヤーも即時に転送されます。詳細は左メニューを参照してください。

# -- Operation & Pairing --
menu_rr_pairing=モードとペアリング
title_rr_pairing=動作モードとペアリング手順
page_pairing_text_1=[item=rift-rail-placer]（Rift Rail Placer）を設置し、GUI で [color=green]Entry[/color] または [color=orange]Exit[/color] を設定します。\n\n[font=default-bold]ペアリング手順:[/font]\n1. Entry と Exit をそれぞれ建設します。\n2. 片方のポータル GUI を開き、「Target Selector」で相手ポータルを選択し、[color=green]Pair[/color] を押します。\n3. ペアリング後、Entry に進入した列車は接続先 Exit から出現します。

# -- Routing Logic --
menu_rr_routing=N-to-M ルーティング
title_rr_routing=N-to-M ルーティング優先順位
page_routing_text_1=v0.10 以降、Rift Rail は [font=default-bold][color=green]多対多（N-to-M）[/color][/font]ネットワークをサポートします。1 Entry から最大 5 Exit、または複数 Entry から 1 Exit への接続が可能です。\n\n1 Entry が複数 Exit に接続されている場合、転送先は次の[color=orange]優先順位[/color]で決定されます。
page_routing_text_2=[font=default-bold]1. 列車時刻表シグナル（最優先）:[/font] 列車時刻表の待機条件に [virtual-signal=riftrail-go-to-id] = [Target ID] があり（比較演算子は無関係、数値のみ参照）、その ID が有効な接続先 Exit を指す場合、そこへ転送します。\n\n[font=default-bold]2. Entry 側回路シグナル:[/font] 1 で有効 Exit が確定しない場合、Entry 側回路ネットワークの [virtual-signal=riftrail-go-to-id] を読み取り、一致する Exit へ転送します。\n\n[font=default-bold]3. デフォルト（フォールバック）:[/font] どちらのシグナルでも有効 Exit が確定しない場合、設定済みデフォルト Exit を使用し、無効なら最初に利用可能な接続先 Exit を使用します。

# -- LTN --
menu_rr_ltn=LTN 連携
title_rr_ltn=LTN サーフェス間設定
page_ltn_text_1=v0.10 以降、LTN のサーフェス間設定は更新されています。Surface A と Surface B の間で有効な LTN 経路を作るには、次のルールに従ってください。\n\n[font=default-bold]1. 往復経路（必須）:[/font]\nLTN ディスパッチャは返路を必要とします。必ず [color=green]Entry A -> Exit B[/color]（例: Nauvis -> Vulcanus）に加えて、逆方向 [color=orange]Entry C -> Exit D[/color]（例: Vulcanus -> Nauvis）も構築してください。\n\n[font=default-bold]2. 手動で個別有効化:[/font]\n旧版と異なり、スイッチはクリックした建物にのみ作用します。関係する[color=red]4 つすべてのポータル[/color]の GUI を開き、[color=green]手動で[/color]「LTN」スイッチを有効化する必要があります。\n\n[font=default-bold]3. 共通ネットワーク（ID -1）:[/font]\n設定簡略化のため、カスタム network_id は廃止されました。Rift Rail ポータルは常に [color=purple]Network ID -1[/color] を使用し、すべての LTN ネットワーク向けの共通ブリッジとして動作します。

# -- CS2 --
menu_rr_cs2=CS2 連携
title_rr_cs2=Cybersyn 2 (CS2) サーフェス間設定
page_cs2_text_1=v0.12 以降、Rift Rail は [font=default-bold][color=cyan]Cybersyn 2 (CS2)[/color][/font] の route plugin API を通じてサーフェス間ルーティングのネイティブサポートを再追加しました。Surface A と Surface B の間で有効な CS2 経路を確立するには、以下のルールに従ってください。\n\n[font=default-bold]1. 往復経路（必須）:[/font]\nCS2 ディスパッチャは返路が必要です。必ず [color=green]Entry A -> Exit B[/color]（例: Nauvis -> Vulcanus）に加えて、逆方向の [color=orange]Entry C -> Exit D[/color]（例: Vulcanus -> Nauvis）も構築してください。\n\n[font=default-bold]2. 手動で個別有効化:[/font]\nスイッチはクリックした建物にのみ作用します。関係する [color=red]4 つすべてのポータル[/color] の GUI を開き、[color=green]手動で[/color]「CS2」スイッチを有効化してください（Entry 側・Exit 側の両方）。\n\n[font=default-bold]3. 自動グローバル最適ルーティング:[/font]\n複数のポータルが利用可能な場合、Rift Rail は列車の Entry へのアプローチ距離と Exit から目標駅までの距離の合計を最小化することで、自動的に最適経路を選択します。手動設定は不要です。\n\n[font=default-bold]4. 片方向ルート警告:[/font]\nCS2 スイッチを有効にした際に片方向の経路しか存在しない場合（例: A→B はあるが B→A がない）、[color=orange]Rift Rail はチャット欄に警告を表示します[/color]。警告を解消するには返路を構築してください。

# -- FAQ --
menu_rr_faq=FAQ とトラブルシュート
title_rr_faq=よくある質問
page_faq_text_1=[font=default-bold]Q: Cybersyn 対応は？[/font]\nA: [font=default-bold][color=green]Cybersyn 2 (CS2)[/color][/font] は v0.12 以降でネイティブサポートが復活しました！設定方法はこのガイドの「[color=cyan]CS2 連携[/color]」ページを参照してください。\nクラシック Cybersyn (v1) は v0.10 で[color=red]恒久的に削除[/color]されました。必要な場合は v0.10.1（N-to-M）または v0.8.2（1-to-1）へダウングレードしてください。\n\n[font=default-bold]Q: 列車が衝突しても転送されない / コライダーが壊れている[/font]\nA: [設定 -> Mod 設定 -> マップ] で [color=orange]「すべてのコライダーを再生成」[/color] を実行してください。\n\n[font=default-bold]Q: この Mod を削除するとセーブが壊れますか？[/font]\nA: 削除前に Mod 設定の [color=red]「アンインストール前クリーンアップ」[/color] を必ず有効化してください。すべてのポータル接続を解除し、残留データを掃除してセーブ破損を防ぎます。

# -- UPS Performance & Tuning --
menu_rr_ups=パフォーマンス（UPS）
title_rr_ups=上級: パフォーマンスと UPS 調整
page_ups_text_1=メガベース向けに、Rift Rail は究極の「ゼロ・コピー」アーキテクチャを実現しました。\n\n[font=default-bold][color=orange]完全なネイティブクローン[/color][/font] 複雑な通常生成を完全にバイパスします。平行配置でも90度交差配置でも、ステートレスな高速数学予測を使用して、C++ネイティブのClone APIを直接トリガーし、無劣化の高精度複製を行います。この方式は UPS 消費が実質ゼロであり、メガベースにおいて無条件の最適解となります。
page_ups_text_2=[font=default-bold][color=orange]Tip 2: 「Teleport Speed」と「Placement Interval」のバランス[/color][/font]\nMod 設定で以下の主要パラメータを調整できます。\n[font=default-bold]・Placement Interval:[/font] 値を上げる（例: 2, 3）と CPU 負荷は下がりますが、車両接続の遅延が増えます。\n[font=default-bold]・Teleport Speed:[/font] 値を上げるとスループットは向上しますが、高速時は低 Interval（例: 1）と組み合わせないと連結切れが起きます。\n\n[font=default-bold]🏆 推奨プリセット:[/font]\n[color=green]高スループットモード:[/color] Interval 1, Speed 1.0~2.4（多くのプレイヤー向け）。\n[color=purple]究極 UPS 節約モード:[/color] Interval 3, Speed 0.5~1.0（1k+ SPM 級メガベース向け）。