[mod-setting-description]
rift-rail-train-gui-track=テレポート前にプレイヤーが列車 GUI を開いていた場合、テレポート後に自動で復元します。大規模サーバーでは無効化で軽量化できます。
rift-rail-show-logistics-notifications=Cybersyn/LTN のサーフェス間接続の作成・切断通知を表示するかを制御します。既定では有効です。
rift-rail-show-cybersyn-global=Cybersyn 接続/切断のチャット通知を表示します（プレイヤーごとの設定）。不要なら無効化できます。
rift-rail-reset-colliders=[危険な操作] マップ上の RiftRail コライダーを強制的に削除し再生成します。アップデート後の衝突不具合や位置ずれ時のみ使用してください。チェック後に自動修復が実行され、この設定は自動でオフに戻ります。
rift-rail-uninstall-cleanup=警告: この設定は Mod を削除する場合、またはサーフェス間接続データを掃除する場合のみ有効にしてください。\nRift Rail ポータルと LTN 接続を強制解除し、外部データを整理して不整合を防ぎます。\n実行前に、テレポート中の列車がないことを確認してください。
rift-rail-teleport-speed=出口ポータルでの列車初速を制御します。\n推奨値: 1.0（約 216 km/h）。高すぎると連結が外れる可能性があります。\n低すぎるとスループットが低下します。\nこの値を上げる場合、配置チェック間隔を下げる必要がある場合があります。\n最小: 0.1 / 最大: 8.0。
rift-rail-placement-interval=次の車両を配置できるかのチェック頻度（tick）を制御します（60 tick = 1 秒）。\n小さいほど安定しますが CPU 使用率はやや増えます。\n大きいほど軽くなりますが高速時に連結切れのリスクがあります。\nこの値を上げる場合は列車速度を下げてください。\n推奨: 1 / 最大: 10。
rift-rail-ltn-use-teleported=有効にすると、Rift Rail ポータル直後に一時停車駅を時刻表へ追加します。これにより列車がポータル前から離れて詰まりを防止します。出口付近に同名の駅を設置してください。
rift-rail-ltn-teleported-name=一時停車駅として使う駅名です。既定値には Mod アイコンが含まれます。
rift-rail-mod-integration=Rift Rail と連携する Mod を選択します。選択内容に合わせてレシピとテクノロジー進行が変化します。同時に有効化できるのは 1 つのみです。\n\nオプション:\n- none: 連携なし。Rift Rail 独自のレシピ/進行を使用。\n- easy-mode: レシピと進行を簡略化。\n- space-age: Space Age の素材と進行に合わせて調整。\n- krastorio2: Krastorio 2 の部品とバランスに合わせて調整。\n- space-exploration: Space Exploration の資源と宇宙進行に合わせて調整。\n- se-k2: Space Exploration + Krastorio 2 環境向けに調整。

