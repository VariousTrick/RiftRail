[technology-description]
rift-rail-tech=Rift Rail（異なるサーフェス間の列車ポータル）を解放します。ポータルを建設して遠隔鉄道網を接続し、列車をシームレスにテレポートできます。
[mod-name]
RiftRail=Rift Rail

[mod-description]
RiftRail=非対称・片方向のサーフェス間列車テレポートシステムを提供します。Entry/Exit モード切替に対応し、Cybersyn 物流スケジューリングにも対応しています。
rift-rail-placer=列車を空間越しに転送できる Rift インターフェースを設置します。\nLTN と Cybersyn2 に対応。\n\n[トラブルシュート]\n衝突後に列車が転送されない、または衝突判定が壊れている場合は、[設定 -> Mod 設定 -> マップ] の「すべてのコライダーを再生成」を実行してください。

