[entity-description]
rift-rail-placer-entity=列車を空間越しに転送できる Rift インターフェースを設置します。\nLTN と Cybersyn に対応。\n\n[トラブルシュート]\n衝突後に列車が転送されない、または衝突判定が壊れている場合は、[設定 -> Mod 設定 -> マップ] の「すべてのコライダーを再生成」を実行してください。
rift-rail-entity=Rift Rail ポータルの本体です。列車テレポートには別ポータルとのペアリングが必要です。不具合時は Mod 設定の「コライダー再生成」を試してください。\n\n[LTN 注意事項]\nLTN 列車で割り込み（Interrupt）機能を使用している場合、テレポート中の積載量誤判定による予期せぬ割り込みを防ぐため、Mod 設定で必ず「LTN: ポータル後に Teleported 停車駅を追加」オプションを有効にしてください。
rift-rail-core=Rift Rail ポータルの中核部品。内部ロジックと接続を担当します。
[virtual-signal-name]
riftrail-go-to-id=RiftRail: 移動先 [ID]

[virtual-signal-description]
riftrail-go-to-id=テレポート先ポータルの ID を指定します。\n使い方: 列車時刻表の回路条件でこの信号値を対象ポータルの ID に設定します。\n例: riftrail-go-to-id = 5 は ID 5 のポータルへ転送。