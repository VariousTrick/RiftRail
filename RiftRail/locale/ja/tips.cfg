[tips]
tips-and-tricks-category=[item=rift-rail-placer] Rift Rail

rift-rail-pairing-tutorial=Rift Rail チュートリアル
item-description-pairing=Rift Rail の中核は [font=default-bold][color=green]ペアリング[/color][/font]です。各 Entry は正しく動作するために、少なくとも 1 つの Exit と接続されている必要があります。ペアリング後、列車が Entry に進入すると接続先 Exit へ転送されます。\n\nペアリング方法: [font=default-bold][color=green]Rift Rail Core[/color][/font] をクリックし、接続したい Exit をクリックして確定します。Entry は複数 Exit と接続でき、Exit も複数 Entry から接続可能です。\n\nペアリング後は、対応する ID が Entry/Exit 側に表示され、接続関係を確認できます。

rift-rail-advanced-routing=Rift Rail 高度ルーティング
item-description-advanced=v0.10 以降、Rift Rail は複雑な [font=default-bold][color=green]多対多（N-to-M）[/color][/font]ネットワークに対応しています。1 Entry から最大 5 Exit、または 5 Entry から 1 Exit への接続が可能です。\n\n1 Entry が複数 Exit に接続されている場合、転送先は次の [color=orange]優先順位[/color] で決定されます。\n[font=default-bold]1. 列車時刻表シグナル（最優先）:[/font] 列車時刻表に [virtual-signal=riftrail-go-to-id] = [Target ID] が設定され（比較演算子は無関係、数値のみ参照）、その ID が有効な接続先 Exit に対応していれば、その Exit へ転送されます。\n\n[font=default-bold]2. Entry 側回路シグナル:[/font] 1 で有効 Exit が確定しない場合、Entry 側回路ネットワークから [virtual-signal=riftrail-go-to-id] を読み取り、一致する Exit を探します。\n\n[font=default-bold]3. デフォルトフォールバック:[/font] どちらのシグナルでも有効 Exit が確定しない場合、設定済みデフォルト Exit を使います。利用不可なら最初に利用可能な接続先 Exit へフォールバックします。\nメガベースで最高性能を目指す場合、Rift Rail には強力な最適化があります。\n\n[font=default-bold][color=orange]同軸配置[/color][/font] ペアの Entry/Exit を [color=green]両方とも縦、または両方とも横[/color] に配置すると、複雑な通常生成を回避してネイティブ Clone API を直接使用します。UPS 消費は非常に小さく、メガベースに最適です！[font=default-bold]結論:[/font] テレポート性能を最大化するには「片方だけ横/縦」の 90 度構成を避け、可能な限りポータルを [color=orange]平行[/color] に配置してください。

internal-signal-switched=内部シグナル切替 -> __1__

