# -- 主页面 --
menu_rift_rail_informatron=裂隙铁路 [item=rift-rail-placer]
title_rift_rail_informatron=裂隙铁路 (Rift Rail) 指南
page_main_text_1=欢迎使用 [font=default-bold][color=193,128,255]裂隙铁路[/color][/font]！本模组提供了一种紧凑、高科技的物流解决方案，允许你跨越遥远的距离，甚至在不同的地表和飞船之间无缝传送列车。
page_main_text_2=与传统的双向连接不同，Rift Rail 采用[font=default-bold][color=orange]非对称的单向传送系统[/color][/font]。不仅完美支持机车、货运车厢、流体车厢和大炮车厢，坐在车内的玩家也会随车辆瞬间传送！请在左侧目录查看详细的操作指南。

# -- 运行与配对 --
menu_rr_pairing=运行与配对
title_rr_pairing=运行模式与配对指南
page_pairing_text_1=请放置 [item=rift-rail-placer] 传送门放置器。打开界面后，你可以将其配置为 [color=green]入口 (传送)[/color] 或 [color=orange]出口 (接收)[/color]。\n\n[font=default-bold]如何配对：[/font]\n1. 确保你建好了一个入口和一个出口。\n2. 打开其中一个传送门的界面，在“选择配对目标”下拉菜单中选择另一个传送门，然后点击[color=green]配对[/color]按钮。\n3. 配对成功后，列车驶入入口即可瞬间从对应的出口驶出。

# -- 路由逻辑 --
menu_rr_routing=多对多路由 (核心)
title_rr_routing=N-to-M 路由优先级
page_routing_text_1=从 v0.10 开始，Rift Rail 支持[font=default-bold][color=green]多对多 (N-to-M)[/color][/font] 的复杂网络！你可以将 1 个入口同时连接到最多 5 个出口，或将多个入口连接到 1 个出口。\n\n当 1 个入口连接了多个出口时，传送门会按照以下[color=orange]优先级[/color]决定列车的去向：
page_routing_text_2=[font=default-bold]1. 列车时刻表信号（最高优先级）：[/font]如果列车时刻表的等待条件中包含虚拟信号 [virtual-signal=riftrail-go-to-id] = [目标ID]（比较符号不影响结果，只读取数值），且该 ID 对应已连接且有效的出口，则列车会精准传送到该出口。\n\n[font=default-bold]2. 入口电路信号：[/font]如果步骤 1 未命中有效出口，系统会读取入口侧电路网络中的 [virtual-signal=riftrail-go-to-id]，命中后传送到对应出口。\n\n[font=default-bold]3. 默认顺位（保底）：[/font]若以上信号都未命中有效出口，列车将传送到默认出口；若默认出口不可用，则回退到连接列表中的第一个可用出口。

# -- LTN --
menu_rr_ltn=LTN 物流网络
title_rr_ltn=LTN 跨地表运输设置
page_ltn_text_1=从 v0.10 开始，LTN 跨地表运输的设置逻辑已全面更新。要建立地表 A 和地表 B 之间有效的 LTN 通路，您必须严格遵循以下规则：\n\n[font=default-bold]1. 双向往返 (硬性要求)：[/font]\nLTN 调度器需要计算回程路径才能成功派单。您必须建立 [color=green]入口 A -> 出口 B[/color] (例如：Nauvis 到 Vulcanus)，同时必须建立反向的 [color=orange]入口 C -> 出口 D[/color] (例如：Vulcanus 到 Nauvis)。\n\n[font=default-bold]2. 手动独立激活：[/font]\n与旧版本不同，现在的开关只影响您点击的那个建筑。您必须打开上述这 [color=red]4 个建筑[/color]的界面，分别在所有入口侧和出口侧都[color=green]手动开启[/color] "LTN" 开关。\n\n[font=default-bold]3. 通用网络 (ID -1)：[/font]\n为了简化配置，自定义传送门网络 ID 的功能已被移除。所有传送门现在固定使用[color=purple]网络 ID -1[/color]，充当所有 LTN 网络的通用桥梁。

page_ltn_text_2=[font=default-bold][color=orange]⚠ 注意：列车中断机制（Interrupt）的兼容性[/color][/font]\n如果你的 LTN 列车时刻表中配置了[font=default-bold]中断机制[/font]（例如："铁矿 < 1000 时自动前往某站"），由于列车采用逐节车厢传送的方式，在传送未完成时引擎会误判货物不足并触发中断。这不会损坏列车行程，但[color=red]可能导致 LTN 无法正确插入跨地表路标[/color]，从而影响物流效率。\n\n[font=default-bold]推荐解决方案：[/font]\n请在 Rift Rail 传送门的设置中开启 [color=green][font=default-bold]"传送后清理站"[/font][/color] 选项。开启后，传送门会为列车提供一个不带 [color=cyan]temporary[/color] 属性的专用站点，消除中断机制的误判触发条件，确保 LTN 路标正常插入。

# -- CS2 --
menu_rr_cs2=CS2 (Cybersyn 2)
title_rr_cs2=CS2 跨地表运输设置
page_cs2_text_1=自 v0.12 起，Rift Rail 通过 [font=default-bold][color=cyan]Cybersyn 2 (CS2)[/color][/font] 的 route plugin 接口重新提供原生支持。要建立地表 A 和地表 B 之间有效的 CS2 通路，请遵循以下规则：\n\n[font=default-bold]1. 双向往返 (硬性要求)：[/font]\nCS2 调度器需要有效的回程路径才能成功派单。您必须建立 [color=green]入口 A -> 出口 B[/color]（例如：Nauvis 到 Vulcanus），同时也必须建立反向的 [color=orange]入口 C -> 出口 D[/color]（例如：Vulcanus 到 Nauvis）。\n\n[font=default-bold]2. 手动独立激活：[/font]\n开关只影响您点击的那个建筑。请打开上述这 [color=red]4 个建筑[/color] 的界面，分别[color=green]手动开启[/color] "CS2" 开关（入口侧和出口侧均需开启）。\n\n[font=default-bold]3. 自动全局最优路由：[/font]\n当存在多个可用传送门时，系统会自动综合"列车到入口的距离"与"出口到目标站的距离"，选择全局最短路径，无需手动配置。\n\n[font=default-bold]4. 单向路径提醒：[/font]\n如果启用 CS2 开关后只存在单向路径（例如 A→B 有，B→A 没有），[color=orange]模组会在聊天栏发出提醒[/color]，请补建回程路线。

# -- FAQ --
menu_rr_faq=常见问题 (FAQ)
title_rr_faq=常见问题与排错
page_faq_text_1=[font=default-bold]问：Cybersyn 兼容功能去哪了？[/font]\n答：[font=default-bold][color=green]Cybersyn 2 (CS2)[/color][/font] 自 v0.12 起已重新获得原生支持！请参阅本指南中的"[color=cyan]CS2 (Cybersyn 2)[/color]"页面了解设置方法。\n经典 Cybersyn (v1) 的支持已于 v0.10 版本[color=red]永久移除[/color]。如需使用请降级至 v0.10.1 (多对多) 或 v0.8.2 (一对一)。\n\n[font=default-bold]问：火车撞击后不传送，或者碰撞箱失效怎么办？[/font]\n答：请前往 [设置 -> 模组设置 -> 地图] 中点击 [color=orange]"重置所有碰撞器"[/color] 进行紧急修复。\n\n[font=default-bold]问：我想卸载这个模组，会坏档吗？[/font]\n答：卸载前，请务必在模组设置中勾选[color=red]"卸载准备 / 数据清理"[/color]，这将强制断开所有连接并清理残留数据，防止坏档！

# -- UPS 性能优化 --
menu_rr_ups=UPS 性能优化
title_rr_ups=进阶：性能与 UPS 优化指南
page_ups_text_1=对于追求极致性能的巨型基地玩家，Rift Rail 实现了终极的“零拷贝”架构：\n\n[font=default-bold][color=orange]全量原生克隆 (Zero-Copy)[/color][/font]传送门现已彻底绕过复杂的常规生成逻辑。无论你是同向平行放置，还是 90 度折角交错布置，系统均会使用无状态的瞬时数学推演直接触发底层的原生 C++ Clone API 进行无损转移克隆。这种方式对 UPS 的消耗接近绝对零度，是巨型基地的无条件终极首选！
page_ups_text_2=[font=default-bold][color=orange]技巧 2：平衡“传送速度”与“检测频率”[/color][/font]\n您可以在模组设置中调整以下参数：\n[font=default-bold]· 放置检测间隔：[/font]提高此值（如 2 或 3）可大幅降低脚本 CPU 消耗，但会导致车厢连接延迟。\n[font=default-bold]· 传送时车辆速度：[/font]值越高吞吐量越大，但过高的速度必须配合极低的检测间隔，否则会导致列车拉断。\n\n[font=default-bold]🏆 推荐预设：[/font]\n[color=green]高吞吐量模式：[/color]检测间隔 1，传送速度 1.0~2.4（适合大多数人）。\n[color=purple]终极 UPS 环保模式：[/color]检测间隔 3，传送速度 0.5~1.0（适合千瓶巨型基地，极低 CPU 消耗）。