[tips]

rift-rail-pairing-tutorial=Rift Rail教程
item-description-pairing=Rift Rail的核心机制是[font=default-bold][color=green]配对[/color][/font]：每个入口都必须至少连接一个出口，才能正常工作。配对后，列车进入入口时会被传送到连接的出口。\n\n配对方法：点击[font=default-bold][color=green]Rift Rail Core[/color][/font]，然后点击要连接的出口，即可完成配对。每个入口可以连接多个出口，每个出口也可以连接多个入口。\n\n配对完成后，入口和出口上会显示对应的ID（，以帮助你识别它们之间的连接关系。

rift-rail-advanced-routing=裂隙轨道高级用法
item-description-advanced=从 v0.10 开始，Rift Rail 支持[font=default-bold][color=green]多对多 (N-to-M)[/color][/font] 的复杂网络！你可以将 1 个入口同时连接到最多 5 个出口，或将5个入口连接到 1 个出口。\n\n当 1 个入口连接了多个出口时，传送门会按照以下[color=orange]优先级[/color]决定列车的去向：\n[font=default-bold]1. 列车时刻表信号（最高优先级）：[/font]如果列车时刻表中设置了 [virtual-signal=riftrail-go-to-id] = [目标ID]（比较符号不影响结果，只读取数值），且该 ID 对应有效出口，则精准传送到该出口。\n\n[font=default-bold]2. 入口电路信号：[/font]如果步骤 1 未命中有效出口，则读取入口侧电路网络中的 [virtual-signal=riftrail-go-to-id] 并尝试匹配出口。\n\n[font=default-bold]3. 默认顺位（保底）：[/font]如果以上信号都未命中有效出口，则使用默认出口；默认出口不可用时，回退到连接列表中的第一个可用出口。\n对于追求极致性能的巨型基地玩家，Rift Rail 提供了深度的优化空间：\n\n[font=default-bold][color=orange]保持同向放置[/color][/font]只要配对的入口与出口[color=green]都是竖着放的，或都是横着放的[/color]，传送门将绕过复杂的常规生成逻辑，直接调用原生 Clone API 进行像素级复制。这种方式对 UPS 的消耗极低，是巨型基地的首选！[font=default-bold]结论：[/font]为了获得最佳的传送性能，请尽量避免“一横一竖”的直角传送，尽可能让出入口[color=orange]保持平行[/color]。

